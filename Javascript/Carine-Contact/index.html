<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carnet de Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mon Carnet de contact</h1>

    <div class="section">
        <h2>Tous les contacts</h2>
        <div id="listeContacts"></div>
    </div>

    <div class="section">
        <h2>Contacts Favoris</h2>
        <div id="listeFavoris"></div>
    </div>

    <div class="section">
        <h2>Ajouter un contact</h2>
        <input type="text" id="nomAjout" placeholder="Nom">
        <input type="text" id="telAjout" placeholder="Téléphone (8 chiffres)">
        <button onclick="AjouterContact()">Ajouter</button>
        <p id="messageAjouter"></p>
    </div>

    <div class="section">
        <h2>Supprimer un contact</h2>
        <input type="text" id="nomSuppr" placeholder="Nom du contact">
        <button onclick="SupprimerContact()">Supprimer</button>
        <p id="messageSuprimer"></p>
    </div>

    <div id="MessageFavori"></div>

    <script src="script.js"></script>
</body>
</html>
